<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creator Collage Drawing Prompt Generator</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1c1610; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const moods = [
      { emoji: "✨", label: "Inspired", color: "#c9a84c" },
      { emoji: "😌", label: "Calm", color: "#8faa8b" },
      { emoji: "🔥", label: "Energized", color: "#b85c38" },
      { emoji: "💭", label: "Dreamy", color: "#9b8ea6" },
      { emoji: "🌿", label: "Grounded", color: "#6b7c4e" },
      { emoji: "🌧️", label: "Melancholy", color: "#7a8c7e" },
      { emoji: "😜", label: "Playful", color: "#c4763a" },
      { emoji: "🧐", label: "Curious", color: "#a07850" },
      { emoji: "😤", label: "Angry", color: "#8b3a2a" },
      { emoji: "😰", label: "Anxious", color: "#7a7040" },
      { emoji: "😊", label: "Happy", color: "#b89a3a" },
      { emoji: "🌅", label: "Hopeful", color: "#a07848" },
    ];

    const levels = [
      { id: "beginner", label: "Beginner", icon: "🌱", desc: "Simple shapes, light detail" },
      { id: "intermediate", label: "Intermediate", icon: "🎨", desc: "Composition & shading" },
      { id: "advanced", label: "Advanced", icon: "⚡", desc: "Complex technique & style" },
    ];

    const SYSTEM_PROMPT = `You are a creative drawing prompt generator. When given a mood and skill level, generate ONE evocative, specific drawing prompt.

If an existing prompt is provided, ADAPT that same core subject/theme to the new skill level — don't invent a new subject. Just reframe the complexity, detail, and challenge to match the new level.

Rules:
- Beginner prompts: simple subjects, basic shapes, minimal detail required (e.g. "a single candle with a gentle flame")
- Intermediate prompts: involve light/shadow, multiple elements, some compositional challenge
- Advanced prompts: complex lighting, abstract concepts, stylistic challenge, emotional depth

Return ONLY a JSON object in this exact format, no markdown, no extra text:
{"prompt": "the drawing prompt here", "tip": "a short 1-sentence technique tip for this level", "tags": ["tag1", "tag2", "tag3"]}`;

    function App() {
      const [step, setStep] = useState("mood");
      const [selectedMood, setSelectedMood] = useState(null);
      const [selectedLevel, setSelectedLevel] = useState(null);
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);

      const generatePrompt = async (mood, level, existingPrompt = null) => {
        setLoading(true);
        setError(null);
        try {
          const userContent = existingPrompt
            ? `Mood: ${mood.label}\nSkill level: ${level.id}\nExisting prompt to adapt: "${existingPrompt}"`
            : `Mood: ${mood.label}\nSkill level: ${level.id}`;
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              system: SYSTEM_PROMPT,
              messages: [{ role: "user", content: userContent }],
            }),
          });
          const data = await response.json();
          const text = data.content.map((i) => i.text || "").join("");
          const clean = text.replace(/```json|```/g, "").trim();
          const parsed = JSON.parse(clean);
          setResult(parsed);
          setStep("result");
        } catch (err) {
          setError("Couldn't generate a prompt. Please try again.");
        } finally {
          setLoading(false);
        }
      };

      const handleLevelSelect = (level) => {
        setSelectedLevel(level);
        generatePrompt(selectedMood, level);
      };

      const reset = () => {
        setStep("mood");
        setSelectedMood(null);
        setSelectedLevel(null);
        setResult(null);
        setError(null);
      };

      const accentColor = selectedMood?.color || "#c9a84c";

      return (
        <div style={{
          minHeight: "100vh", background: "#1c1610",
          fontFamily: "'Georgia', 'Times New Roman', serif",
          display: "flex", flexDirection: "column",
          alignItems: "center", justifyContent: "center",
          padding: "2rem", position: "relative", overflow: "hidden",
        }}>
          {/* Grain overlay */}
          <div style={{
            position: "fixed", inset: 0, pointerEvents: "none", zIndex: 0,
            backgroundImage: `url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E")`,
            opacity: 0.6,
          }} />

          {/* Ambient glow */}
          <div style={{
            position: "fixed", top: "20%", left: "50%", transform: "translateX(-50%)",
            width: "600px", height: "400px", borderRadius: "50%",
            background: `radial-gradient(ellipse, ${accentColor}18 0%, transparent 70%)`,
            pointerEvents: "none", zIndex: 0, transition: "background 0.8s ease", filter: "blur(40px)",
          }} />

          <div style={{ position: "relative", zIndex: 1, width: "100%", maxWidth: "680px" }}>

            {/* Header */}
            <div style={{ textAlign: "center", marginBottom: "3rem" }}>
              <div style={{ fontSize: "0.7rem", letterSpacing: "0.4em", color: "#6b5a42", textTransform: "uppercase", marginBottom: "0.75rem" }}>
                ✦ creator collage ✦
              </div>
              <h1 style={{ fontSize: "clamp(1.4rem, 3.5vw, 2.4rem)", fontWeight: "400", color: "#e8dcc8", margin: 0, lineHeight: 1.2, letterSpacing: "-0.02em" }}>
                Creator Collage<br />
                <span style={{ color: accentColor, transition: "color 0.6s ease", fontStyle: "italic" }}>
                  Drawing Prompt Generator
                </span>
              </h1>
            </div>

            {/* Step indicator */}
            <div style={{ display: "flex", justifyContent: "center", gap: "0.5rem", marginBottom: "2.5rem" }}>
              {["mood", "level", "result"].map((s) => (
                <div key={s} style={{
                  width: step === s ? "2rem" : "0.5rem", height: "0.25rem", borderRadius: "9999px",
                  background: step === s ? accentColor : "#3a2e22", transition: "all 0.4s ease",
                }} />
              ))}
            </div>

            {/* STEP 1: Mood */}
            {step === "mood" && (
              <div style={{ animation: "fadeUp 0.5s ease" }}>
                <p style={{ textAlign: "center", color: "#8a7560", fontSize: "1rem", marginBottom: "2rem", letterSpacing: "0.02em" }}>
                  How are you feeling right now?
                </p>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "0.75rem" }}>
                  {moods.map((mood) => (
                    <button key={mood.label}
                      onClick={() => { setSelectedMood(mood); setStep("level"); }}
                      style={{ background: "#251e16", border: "1px solid #3a2e22", borderRadius: "12px", padding: "1.25rem 0.5rem", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: "0.5rem", transition: "all 0.2s ease", color: "#a08060" }}
                      onMouseEnter={(e) => { e.currentTarget.style.borderColor = mood.color; e.currentTarget.style.background = `${mood.color}18`; e.currentTarget.style.transform = "translateY(-2px)"; e.currentTarget.style.color = "#e8dcc8"; }}
                      onMouseLeave={(e) => { e.currentTarget.style.borderColor = "#3a2e22"; e.currentTarget.style.background = "#251e16"; e.currentTarget.style.transform = "translateY(0)"; e.currentTarget.style.color = "#a08060"; }}
                    >
                      <span style={{ fontSize: "1.75rem" }}>{mood.emoji}</span>
                      <span style={{ fontSize: "0.72rem", letterSpacing: "0.08em", textTransform: "uppercase" }}>{mood.label}</span>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* STEP 2: Level */}
            {step === "level" && (
              <div style={{ animation: "fadeUp 0.5s ease" }}>
                <p style={{ textAlign: "center", color: "#8a7560", fontSize: "1rem", marginBottom: "2rem" }}>
                  <span style={{ fontSize: "1.3rem" }}>{selectedMood?.emoji}</span>{" "}
                  Feeling <span style={{ color: accentColor }}>{selectedMood?.label}</span> — what's your skill level?
                </p>
                <div style={{ display: "flex", flexDirection: "column", gap: "0.75rem" }}>
                  {levels.map((level) => (
                    <button key={level.id} onClick={() => handleLevelSelect(level)}
                      style={{ background: "#251e16", border: "1px solid #3a2e22", borderRadius: "14px", padding: "1.25rem 1.75rem", cursor: "pointer", display: "flex", alignItems: "center", gap: "1.25rem", transition: "all 0.2s ease", textAlign: "left" }}
                      onMouseEnter={(e) => { e.currentTarget.style.borderColor = accentColor; e.currentTarget.style.background = `${accentColor}15`; e.currentTarget.style.transform = "translateX(4px)"; }}
                      onMouseLeave={(e) => { e.currentTarget.style.borderColor = "#3a2e22"; e.currentTarget.style.background = "#251e16"; e.currentTarget.style.transform = "translateX(0)"; }}
                    >
                      <span style={{ fontSize: "2rem" }}>{level.icon}</span>
                      <div>
                        <div style={{ color: "#e8dcc8", fontWeight: "500", fontSize: "1.05rem" }}>{level.label}</div>
                        <div style={{ color: "#7a6548", fontSize: "0.82rem", marginTop: "0.2rem", letterSpacing: "0.02em" }}>{level.desc}</div>
                      </div>
                      <div style={{ marginLeft: "auto", color: "#5a4530", fontSize: "1.2rem" }}>→</div>
                    </button>
                  ))}
                </div>
                <button onClick={reset} style={{ background: "none", border: "none", color: "#5a4530", cursor: "pointer", marginTop: "1.5rem", display: "block", marginLeft: "auto", marginRight: "auto", fontSize: "0.8rem", letterSpacing: "0.08em", textTransform: "uppercase", textDecoration: "underline" }}>
                  ← back
                </button>
              </div>
            )}

            {/* Loading */}
            {loading && (
              <div style={{ textAlign: "center", padding: "4rem 0", animation: "fadeUp 0.4s ease" }}>
                <div style={{ width: "48px", height: "48px", border: "2px solid #3a2e22", borderTop: `2px solid ${accentColor}`, borderRadius: "50%", animation: "spin 0.9s linear infinite", margin: "0 auto 1.5rem" }} />
                <p style={{ color: "#7a6548", fontSize: "0.85rem", letterSpacing: "0.1em", textTransform: "uppercase" }}>conjuring your prompt...</p>
              </div>
            )}

            {/* STEP 3: Result */}
            {step === "result" && result && !loading && (
              <div style={{ animation: "fadeUp 0.5s ease" }}>
                {/* Badges */}
                <div style={{ display: "flex", gap: "0.5rem", justifyContent: "center", marginBottom: "1.25rem" }}>
                  <span style={{ background: `${accentColor}20`, border: `1px solid ${accentColor}40`, borderRadius: "99px", padding: "0.3rem 0.9rem", fontSize: "0.75rem", color: accentColor, letterSpacing: "0.08em" }}>
                    {selectedMood?.emoji} {selectedMood?.label}
                  </span>
                  <span style={{ background: "#1e1710", border: "1px solid #3a2e22", borderRadius: "99px", padding: "0.3rem 0.9rem", fontSize: "0.75rem", color: "#8a7560", letterSpacing: "0.08em" }}>
                    {selectedLevel?.icon} {selectedLevel?.label}
                  </span>
                </div>

                {/* Level switcher */}
                <div style={{ display: "flex", justifyContent: "center", gap: "0.5rem", marginBottom: "2rem" }}>
                  {levels.map((level) => {
                    const isActive = selectedLevel?.id === level.id;
                    return (
                      <button key={level.id}
                        onClick={() => { if (!isActive && !loading) { setSelectedLevel(level); generatePrompt(selectedMood, level, result?.prompt); } }}
                        style={{ background: isActive ? `${accentColor}18` : "transparent", border: `1px solid ${isActive ? accentColor : "#3a2e22"}`, borderRadius: "10px", padding: "0.45rem 1rem", cursor: isActive ? "default" : "pointer", color: isActive ? accentColor : "#6b5a42", fontSize: "0.75rem", letterSpacing: "0.06em", fontFamily: "'Georgia', serif", transition: "all 0.2s ease", display: "flex", alignItems: "center", gap: "0.35rem" }}
                        onMouseEnter={(e) => { if (!isActive) { e.currentTarget.style.borderColor = "#7a6548"; e.currentTarget.style.color = "#a08060"; } }}
                        onMouseLeave={(e) => { if (!isActive) { e.currentTarget.style.borderColor = "#3a2e22"; e.currentTarget.style.color = "#6b5a42"; } }}
                      >
                        <span>{level.icon}</span><span>{level.label}</span>
                      </button>
                    );
                  })}
                </div>

                {/* Prompt card */}
                <div style={{ background: "#201810", border: `1px solid ${accentColor}30`, borderRadius: "20px", padding: "2.5rem", marginBottom: "1rem", position: "relative", overflow: "hidden" }}>
                  <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: "1px", background: `linear-gradient(90deg, transparent, ${accentColor}60, transparent)` }} />
                  <div style={{ fontSize: "0.65rem", letterSpacing: "0.35em", color: accentColor, textTransform: "uppercase", marginBottom: "1.25rem" }}>Your Prompt</div>
                  <p style={{ fontSize: "clamp(1.15rem, 2.5vw, 1.45rem)", color: "#e8dcc8", lineHeight: 1.65, margin: 0, fontStyle: "italic", fontWeight: "400" }}>
                    "{result.prompt}"
                  </p>
                  {result.tags && (
                    <div style={{ display: "flex", gap: "0.4rem", flexWrap: "wrap", marginTop: "1.5rem" }}>
                      {result.tags.map((tag) => (
                        <span key={tag} style={{ background: "#2a1f14", border: "1px solid #3a2e22", borderRadius: "6px", padding: "0.2rem 0.6rem", fontSize: "0.7rem", color: "#7a6548", letterSpacing: "0.06em" }}>#{tag}</span>
                      ))}
                    </div>
                  )}
                </div>

                {/* Tip */}
                {result.tip && (
                  <div style={{ background: "#1a1208", border: "1px solid #3a2e22", borderRadius: "14px", padding: "1.25rem 1.5rem", marginBottom: "2rem", display: "flex", gap: "0.75rem", alignItems: "flex-start" }}>
                    <span style={{ fontSize: "1rem", marginTop: "0.1rem" }}>💡</span>
                    <p style={{ color: "#8a7560", fontSize: "0.85rem", margin: 0, lineHeight: 1.6, letterSpacing: "0.01em" }}>
                      <span style={{ color: "#6b5a42", textTransform: "uppercase", fontSize: "0.65rem", letterSpacing: "0.2em" }}>Technique tip: </span>
                      {result.tip}
                    </p>
                  </div>
                )}

                {/* Actions */}
                <div style={{ display: "flex", gap: "0.75rem" }}>
                  <button onClick={() => generatePrompt(selectedMood, selectedLevel)}
                    style={{ flex: 1, background: accentColor, border: "none", borderRadius: "12px", padding: "1rem", cursor: "pointer", color: "#1c1610", fontFamily: "'Georgia', serif", fontSize: "0.9rem", fontWeight: "600", letterSpacing: "0.04em", transition: "opacity 0.2s ease" }}
                    onMouseEnter={(e) => e.currentTarget.style.opacity = "0.85"}
                    onMouseLeave={(e) => e.currentTarget.style.opacity = "1"}
                  >New Prompt ↺</button>
                  <button onClick={reset}
                    style={{ flex: 1, background: "transparent", border: "1px solid #3a2e22", borderRadius: "12px", padding: "1rem", cursor: "pointer", color: "#7a6548", fontFamily: "'Georgia', serif", fontSize: "0.9rem", letterSpacing: "0.04em", transition: "all 0.2s ease" }}
                    onMouseEnter={(e) => { e.currentTarget.style.borderColor = "#7a6548"; e.currentTarget.style.color = "#a08060"; }}
                    onMouseLeave={(e) => { e.currentTarget.style.borderColor = "#3a2e22"; e.currentTarget.style.color = "#7a6548"; }}
                  >Change Mood</button>
                </div>
              </div>
            )}

            {/* Error */}
            {error && (
              <div style={{ textAlign: "center", color: "#b85c38", padding: "1rem", fontSize: "0.9rem" }}>
                {error}
                <button onClick={reset} style={{ background: "none", border: "none", color: "#b85c38", cursor: "pointer", textDecoration: "underline", marginLeft: "0.5rem" }}>Try again</button>
              </div>
            )}

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
